# Local development profile: run without a local MySQL password.
spring.datasource.url=jdbc:h2:mem:traffic_risk_db;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Keep local startup independent from external services.
spring.data.redis.repositories.enabled=false
app.prediction-module.sync-mode=false
app.prediction-module.submit-url=

# 服务器端口
server.port=8080

# H2 数据库配置 (开发环境)
spring.datasource.url=jdbc:h2:mem:traffic_risk_db;MODE=MySQL;DATABASE_TO_UPPER=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 控制台 (开发调试用)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA 配置
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Jackson 日期格式
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Shanghai

# 文件上传
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=60MB
app.upload-dir=uploads

# 数据预测模块接口
# 后端只负责提交事故信息和接收预测模块回传结果，不在本模块内执行事故类型/风险/拥堵预测。
# 配置示例: app.prediction-module.submit-url=http://localhost:9000/api/v1/prediction-requests
app.prediction-module.submit-url=

# 登录认证 Token 配置
# 生产环境请替换为更复杂的随机密钥，也可以改成环境变量注入。
app.auth.jwt-secret=transfer-dev-secret-change-me
app.auth.jwt-expiration-seconds=86400

# 硅基流动 API，用于将结构化预测结果生成自然语言解释
# 官方接口为 OpenAI 兼容 chat/completions 格式
app.siliconflow.api-url=https://api.siliconflow.cn/v1/chat/completions
app.siliconflow.model=Qwen/Qwen2.5-7B-Instruct
app.siliconflow.api-key=${SILICONFLOW_API_KEY:}
# 服务器端口
server.port=8080

# H2 数据库配置
spring.datasource.url=jdbc:h2:mem:traffic_risk_db;MODE=MySQL;DATABASE_TO_UPPER=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 控制台
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# 日期与时区
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Shanghai

# 文件上传
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=60MB
app.upload-dir=uploads

# ==================================================
# 登录认证 Token 配置
# ==================================================
# 生产环境建议通过环境变量 APP_AUTH_JWT_SECRET 注入更复杂的随机密钥。
app.auth.jwt-secret=${APP_AUTH_JWT_SECRET:transfer-dev-secret-change-me}
app.auth.jwt-expiration-seconds=86400

# ==================================================
# 数据预测模块接口
# ==================================================
# 后端只负责提交事故信息和接收预测模块回传结果。
# 配置示例：
# app.prediction-module.submit-url=http://localhost:9000/api/v1/prediction-requests
app.prediction-module.submit-url=

# ==================================================
# 百度地图
# ==================================================

# 后端 Web Service API 使用的服务端 AK。
# 通过环境变量 BAIDU_MAP_SERVER_AK 设置。
baidu.map.server-ak=${BAIDU_MAP_SERVER_AK:}

# 前端 JavaScript API GL 使用的浏览器端 AK。
# 需要在百度地图控制台另外创建“浏览器端”应用。
baidu.map.browser-ak=${BAIDU_MAP_BROWSER_AK:}

# 百度地图 API 地址
baidu.map.base-url=https://api.map.baidu.com

# ==================================================
# 硅基流动 API
# ==================================================
# 用于将结构化预测结果生成自然语言解释。
# 官方接口为 OpenAI 兼容 chat/completions 格式。
app.siliconflow.api-url=https://api.siliconflow.cn/v1/chat/completions
app.siliconflow.model=Qwen/Qwen2.5-7B-Instruct
app.siliconflow.api-key=${SILICONFLOW_API_KEY:}

# 服务器端口
server.port=8080
server.forward-headers-strategy=framework

# H2 数据库配置
spring.datasource.url=jdbc:h2:mem:traffic_risk_db;MODE=MySQL;DATABASE_TO_UPPER=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 控制台
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# 日期与时区
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Shanghai

# 跨域：生产环境通过 CORS_ALLOWED_ORIGIN_PATTERNS 指定前端域名，多个域名用逗号分隔
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

# 文件上传
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=60MB
app.upload-dir=uploads

# ==================================================
# 登录认证 Token 配置
# ==================================================
# 生产环境建议通过环境变量 APP_AUTH_JWT_SECRET 注入更复杂的随机密钥。
app.auth.jwt-secret=${APP_AUTH_JWT_SECRET:}
app.auth.jwt-expiration-seconds=86400
app.auth.jwt-clock-skew-seconds=30
app.auth.jwt-issuer=traffic-risk-backend
app.auth.jwt-audience=traffic-risk-web

# ==================================================
# 数据预测模块对接（双算法流水线）
# ==================================================
# 预测端实现两个预测算法：
#   算法 A — 事故类型识别（文本+图片 → accident_type、evidence）
#   算法 B — 风险影响评估（结构化特征 → risk_level、congestion/recovery）
# 后端通过 PredictionPipelineService 同步调用预测模块并即时写入结果。

# 新版同步预测模块
app.prediction-module.base-url=http://localhost:9000
app.prediction-module.predict-path=/predict
app.prediction-module.health-path=/health

app.prediction-module.connect-timeout=5000
app.prediction-module.read-timeout=60000

app.prediction-module.algorithms=ACCIDENT_TYPE,RISK_IMPACT
app.prediction-module.sync-mode=true

# 旧版接口暂时关闭
app.prediction-module.submit-url=

# 旧版异步提交接口（降级兼容）：
# app.prediction-module.submit-url=http://localhost:9000/api/v1/prediction-requests
app.prediction-module.submit-url=

# 预测模块基础 URL（新版同步流水线）
app.prediction-module.base-url=

# 预测端点路径（相对 base-url）
app.prediction-module.predict-path=/predict

# 健康检查路径
app.prediction-module.health-path=/health

# HTTP 超时（毫秒）
app.prediction-module.connect-timeout=5000
app.prediction-module.read-timeout=60000

# 启用的算法（逗号分隔：ACCIDENT_TYPE,RISK_IMPACT）
app.prediction-module.algorithms=ACCIDENT_TYPE,RISK_IMPACT

# 是否同步等待预测结果（true=同步流水线, false=异步回调）
app.prediction-module.sync-mode=true

# ==================================================
# 百度地图
# ==================================================

# 后端 Web Service API 使用的服务端 AK。
# 通过环境变量 BAIDU_MAP_SERVER_AK 设置。
baidu.map.server-ak=${BAIDU_MAP_SERVER_AK:}

# 前端 JavaScript API GL 使用的浏览器端 AK。
# 需要在百度地图控制台另外创建“浏览器端”应用。
baidu.map.browser-ak=${BAIDU_MAP_BROWSER_AK:}

# 百度地图 API 地址
baidu.map.base-url=https://api.map.baidu.com

# ==================================================
# 硅基流动 API
# ==================================================
# 用于将结构化预测结果生成自然语言解释。
# 官方接口为 OpenAI 兼容 chat/completions 格式。
app.siliconflow.api-url=https://api.siliconflow.cn/v1/chat/completions
app.siliconflow.model=Qwen/Qwen2.5-7B-Instruct
app.siliconflow.api-key=${SILICONFLOW_API_KEY:}

# 普通市民上报成功后是否自动把事故提交给数据预测模块。
# 没有配置 app.prediction-module.submit-url 时，接口会返回未配置状态，不影响事故保存。
app.incident.auto-submit-prediction-on-public-report=true

# QQ SMTP
spring.mail.host=smtp.qq.com
spring.mail.port=465
spring.mail.username=${QQ_MAIL_USERNAME}
spring.mail.password=${QQ_MAIL_AUTH_CODE}
spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true

# 防止 SMTP 故障导致请求线程永久阻塞
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# 发件人应与 SMTP 登录邮箱一致
app.mail.from=${QQ_MAIL_USERNAME}

# Redis：邮箱验证码、滑块挑战、滑块验证凭证、JWT 会话均存储于 Redis
spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.connect-timeout=3s
spring.data.redis.timeout=3s
spring.data.redis.repositories.enabled=false
app.redis.key-prefix=${REDIS_KEY_PREFIX:transfer}

# 滑块验证码
app.verification.slider-challenge-expire-seconds=120
app.verification.slider-token-expire-seconds=120
app.verification.slider-tolerance-pixels=6
app.verification.slider-max-attempts=5
app.verification.slider-bind-client=true

# 邮箱验证码
app.verification.email-code-expire-seconds=300
app.verification.email-code-resend-interval-seconds=60
app.verification.email-code-max-attempts=5

# 正式环境必须关闭
app.verification.return-code-in-response=false
app.verification.console-log-code=false
# ==================================================
# 服务器
# ==================================================
server.port=8080

# 反向代理请求头支持
server.forward-headers-strategy=framework


# ==================================================
# 本地 MySQL 数据库
# ==================================================
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/traffic_risk_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.username=root

spring.datasource.password=ssy20060403


# ==================================================
# JPA / Hibernate
# ==================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=false

spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.globally_quoted_identifiers=false


# ==================================================
# 日期与时区
# ==================================================
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

spring.jackson.time-zone=Asia/Shanghai


# ==================================================
# 跨域配置
# ==================================================
app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*,http://192.168.*:*,http://10.*:*,http://172.*.*.*:*


# ==================================================
# 文件上传
# ==================================================
spring.servlet.multipart.max-file-size=20MB

spring.servlet.multipart.max-request-size=60MB

app.upload-dir=uploads


# ==================================================
# 登录认证 Token
# ==================================================

# JWT 密钥长度必须至少为 32 个 UTF-8 字节
app.auth.jwt-secret=9sK2pR7vG5nT8bQ3zX6dF1jL4mC0hN7wY2aS5dF9gH1jK3lM6nP8qR0tV2bX5cZ8

# Token 有效时间：24 小时
app.auth.jwt-expiration-seconds=86400

# JWT 时间容差
app.auth.jwt-clock-skew-seconds=30

# JWT 签发者
app.auth.jwt-issuer=traffic-risk-backend

# JWT 接收方
app.auth.jwt-audience=traffic-risk-web


# ==================================================
# 数据预测模块
# ==================================================

# 旧版异步预测接口，暂时关闭
app.prediction-module.submit-url=

# FastAPI 预测模块地址
app.prediction-module.base-url=http://127.0.0.1:9000

# 预测接口
app.prediction-module.predict-path=/predict

# 健康检查接口
app.prediction-module.health-path=/health

# HTTP 连接超时，单位：毫秒
app.prediction-module.connect-timeout=5000

# HTTP 读取超时，单位：毫秒
app.prediction-module.read-timeout=60000

# 启用的算法
app.prediction-module.algorithms=ACCIDENT_TYPE,RISK_IMPACT

# 是否同步等待预测结果
app.prediction-module.sync-mode=true


# ==================================================
# YOLOv5 视觉事故检测 API
# ==================================================

# YOLOv5 FastAPI 服务地址
# 检测类别：
# car damage
# fire
# car flip
# car crash
app.yolo.base-url=http://localhost:8000

# 默认置信度阈值
app.yolo.default-conf=0.3



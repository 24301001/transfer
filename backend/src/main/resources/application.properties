# 服务器端口
server.port=8080

# H2 数据库配置
spring.datasource.url=jdbc:h2:mem:traffic_risk_db;MODE=MySQL;DATABASE_TO_UPPER=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 控制台
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# 日期与时区
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Shanghai

# 文件上传
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=60MB
app.upload-dir=uploads

# ==================================================
# 登录认证 Token 配置
# ==================================================
# 生产环境建议通过环境变量 APP_AUTH_JWT_SECRET 注入更复杂的随机密钥。
app.auth.jwt-secret=${APP_AUTH_JWT_SECRET:transfer-dev-secret-change-me}
app.auth.jwt-expiration-seconds=86400

# ==================================================
# 数据预测模块对接（双算法流水线）
# ==================================================
# 预测端实现两个预测算法：
#   算法 A — 事故类型识别（文本+图片 → accident_type、evidence）
#   算法 B — 风险影响评估（结构化特征 → risk_level、congestion/recovery）
# 后端通过 PredictionPipelineService 同步调用预测模块并即时写入结果。
#
# 旧版异步提交接口（降级兼容）：
# app.prediction-module.submit-url=http://localhost:9000/api/v1/prediction-requests
app.prediction-module.submit-url=

# 预测模块基础 URL（新版同步流水线）
app.prediction-module.base-url=

# 预测端点路径（相对 base-url）
app.prediction-module.predict-path=/predict

# 健康检查路径
app.prediction-module.health-path=/health

# HTTP 超时（毫秒）
app.prediction-module.connect-timeout=5000
app.prediction-module.read-timeout=60000

# 启用的算法（逗号分隔：ACCIDENT_TYPE,RISK_IMPACT）
app.prediction-module.algorithms=ACCIDENT_TYPE,RISK_IMPACT

# 是否同步等待预测结果（true=同步流水线, false=异步回调）
app.prediction-module.sync-mode=true


# ==================================================
# 滑块验证码
# ==================================================

# 滑块挑战有效时间
app.verification.slider-challenge-expire-seconds=120

# 滑块验证 Token 有效时间
app.verification.slider-token-expire-seconds=120

# 滑块误差容许范围
app.verification.slider-tolerance-pixels=6

# 滑块最大尝试次数
app.verification.slider-max-attempts=5

# 是否绑定客户端
app.verification.slider-bind-client=true


# ==================================================
# 图形验证码和邮箱验证码
# ==================================================

# 图形验证码有效时间
app.verification.captcha-expire-seconds=120

# 邮箱验证码有效时间
app.verification.email-code-expire-seconds=300

# 邮箱验证码重新发送间隔
app.verification.email-code-resend-interval-seconds=60

# 邮箱验证码最大尝试次数
app.verification.email-code-max-attempts=5


# ==================================================
# 本地开发验证码调试
# ==================================================

# 本地开发时返回验证码，方便测试
# 正式部署时改为 false
app.verification.return-code-in-response=true

# 本地开发时在控制台打印验证码
# 正式部署时改为 false
app.verification.console-log-code=true

# ==================================================
# 管理员系统健康检查
# ==================================================

# 应用名称和展示版本
spring.application.name=traffic-risk-backend
app.version=0.0.1-SNAPSHOT

# 外部依赖健康探测超时，单位：毫秒
app.health.external-timeout-ms=2000

# YOLO 健康检查路径
app.yolo.health-path=/health


services:
  redis:
    image: redis:7.4-alpine
    container_name: transfer-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - "${REDIS_PASSWORD:-change-this-redis-password}"
    volumes:
      - transfer_redis_data:/data

volumes:
  transfer_redis_data:

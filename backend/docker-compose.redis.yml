services:
  redis:
    image: redis:7.4-alpine
    container_name: transfer-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - "change-this-redis-password"
    volumes:
      - transfer_redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - -a
        - change-this-redis-password
        - ping
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

volumes:
  transfer_redis_data:

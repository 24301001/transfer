services:
  mysql:
    image: mysql:8.0
    container_name: transfer-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: q20051113
      MYSQL_DATABASE: traffic_risk_db
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - transfer_mysql_data:/var/lib/mysql
      - ../database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -pq20051113 --silent
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

volumes:
  transfer_mysql_data:
